  <!-- Hero Blog -->
  <section class="blog-hero">

      <h1>Blog</h1>

    </div>

  <!-- Filtros y Buscador -->
  <section class="blog-section">

      <div class="blog-filters">
        <input type="text" id="searchInput" placeholder="Buscar artículos..." class="search-bar">
        
        <div class="category-filters">
          <button class="filter-btn active" data-category="all">Todos</button>
          <button class="filter-btn" data-category="web">Web Development</button>
          <button class="filter-btn" data-category="javascript">JavaScript</button>
          <button class="filter-btn" data-category="design">Diseño</button>
        </div>
      </div>

      <div class="blog-grid" id="blogGrid">
        <!-- Se llenan con JavaScript -->
      </div>

  </section>
